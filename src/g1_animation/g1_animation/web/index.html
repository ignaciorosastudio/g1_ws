<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>G1 Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="title">G1 Console</div>
    <div class="status-bar">
      <span id="conn" class="conn">connecting…</span>
      <span class="sep">·</span>
      <span>now: <strong id="current">—</strong></span>
      <span class="sep">·</span>
      <span>latency: <strong id="latency">—</strong> ms</span>
      <span class="sep">·</span>
      <span>speed: <strong id="speed-readout">1.00×</strong></span>
    </div>
  </header>

  <main>
    <section class="controls">
      <button id="stop-btn" class="stop">
        <span>STOP</span>
        <span class="key">SPACE</span>
      </button>
      <div class="speed">
        <label for="speed">Speed</label>
        <input id="speed" type="range" min="0.5" max="1.5" step="0.05" value="1.0">
        <button id="speed-reset" class="ghost" title="reset to 1.0×">reset</button>
      </div>
    </section>

    <section id="grid" class="grid"></section>

    <p class="hint">
      Click a tile or press its key. <kbd>Space</kbd> = stop. <kbd>Enter</kbd> = fire closest cue.
    </p>

    <section class="timeline-panel">
      <div class="transport">
        <button id="t-rewind" class="t-btn" title="Rewind to 0:00">⏮</button>
        <button id="t-play"   class="t-btn" title="Play">▶</button>
        <button id="t-pause"  class="t-btn" title="Pause">❚❚</button>
        <span class="clock">
          <strong id="clock">0:00.0</strong>
          <span class="dur-sep">/</span>
          <span id="duration">—</span>
        </span>
        <span id="show-name" class="show-name">—</span>
        <label class="autofire" id="autofire-label">
          <input id="autofire" type="checkbox">
          <span>Auto-fire</span>
        </label>
        <label class="autofire editmode-label" id="editmode-label">
          <input id="editmode" type="checkbox">
          <span>Edit</span>
        </label>
        <button id="reload-cues" class="ghost" title="Re-read cues from disk">Reload</button>
        <button id="save-cues" class="ghost save-btn" title="Write cues to disk" hidden>Save</button>
      </div>

      <div class="next-cue">
        <span class="next-label">NEXT</span>
        <span class="next-name" id="next-name">—</span>
        <span class="next-meta" id="next-meta"></span>
        <span class="next-in" id="next-in"></span>
      </div>

      <div class="edit-row" id="edit-row" hidden>
        <span class="edit-label">EDITING</span>
        <span class="edit-time" id="edit-time">—</span>
        <input type="text" id="edit-clip"  placeholder="clip"  list="clip-list" autocomplete="off">
        <input type="text" id="edit-label" placeholder="label" autocomplete="off">
        <button id="edit-deselect" class="ghost" title="Deselect">×</button>
      </div>
      <datalist id="clip-list"></datalist>

      <div class="timeline">
        <div class="ruler" id="ruler">
          <div class="markers" id="markers"></div>
          <div class="playhead" id="playhead"></div>
        </div>
      </div>

      <p id="cue-warning" class="warning" hidden></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
